name: 🐧 Linux aarch64 Builds

on:
  push:
    branches:
      - "macOS"
  pull_request:
    branches:
      - macOS

jobs:
  build_linux_qt:
    name: "AppImage"
    uses: ./.github/workflows/linux_build_qt.yml
    with:
      jobName: "AppImage Build"
      artifactPrefixName: "ARMSX2-linux-Qt-arm64-appimage"
      compiler: clang
      cmakeflags: ""
      buildAppImage: true
    secrets: inherit
