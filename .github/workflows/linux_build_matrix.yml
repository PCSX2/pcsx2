name: 🐧 Linux aarch64 Builds

on:
  push:
    branches:
      - "macOS"
  pull_request:
    branches:
      - macOS

jobs:
  build_linux_qt:
    name: "AppImage"
    strategy:
      fail-fast: false
      matrix:
        include:
          # The GitHub aarch64 runners use 4K pages, so an unqualified build only
          # runs on 4K-page kernels. 16K-page kernels (e.g. Asahi Linux on Apple
          # Silicon) need a separate binary, so build both variants explicitly
          # instead of quietly inheriting the runner's page size.
          - pageVariant: "4k"
            pageSize: "4096"
            cacheLineSize: "64"
          - pageVariant: "16k"
            pageSize: "16384"
            cacheLineSize: "128"
    uses: ./.github/workflows/linux_build_qt.yml
    with:
      jobName: "AppImage Build (${{ matrix.pageVariant }} pages)"
      artifactPrefixName: "ARMSX2-linux-Qt-arm64-${{ matrix.pageVariant }}-appimage"
      compiler: clang
      cmakeflags: "-DHOST_PAGE_SIZE=${{ matrix.pageSize }} -DHOST_CACHE_LINE_SIZE=${{ matrix.cacheLineSize }}"
      buildAppImage: true
    secrets: inherit
