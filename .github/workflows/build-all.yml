# Unified "build everything on every commit" pipeline for the single-core monorepo.
#
# One push to the default branch fans out to every supported target and uploads
# an individual binary artifact per platform:
#   * PC arm64 Qt GUI  -> macOS, Linux   (reuses the existing reusable workflows)
#   * Android APK       -> platforms/android  (Gradle + NDK, thin CMake on root core)
#   * iOS .app          -> platforms/ios      (Xcode/CMake on root core)
#
# Windows-on-arm64 is intentionally NOT wired yet: the macOS branch never carried
# a windows_build_qt.yml to reuse. Tracked in REFACTOR_STATUS.md.
#
# NOTE: The Android and iOS jobs build against the freshly-collapsed single core
# and have not yet had a green run; they are the mechanism that will surface the
# remaining reconciliation work. Keep them non-blocking until they first pass.
name: Build All Platforms

on:
  push:
    branches:
      - main
      - master
      - macOS
      - refactor/monorepo
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- PC arm64 Qt GUI (mac / linux) -------------------------------------
  pc-macos-arm64:
    name: PC · macOS arm64 (Qt)
    uses: ./.github/workflows/macos_build.yml
    with:
      jobName: "macOS arm64"
      artifactPrefixName: "armsx2-macos-arm64"

  pc-linux-arm64:
    name: PC · Linux arm64 (Qt)
    uses: ./.github/workflows/linux_build_qt.yml
    with:
      jobName: "Linux arm64"
      artifactPrefixName: "armsx2-linux-arm64"
      compiler: clang
      cmakeflags: ""
      buildAppImage: true

  # ---- Android APK -------------------------------------------------------
  android:
    name: Android APK
    runs-on: ubuntu-24.04
    # Non-blocking until the collapsed-core Android build first goes green.
    continue-on-error: true
    defaults:
      run:
        working-directory: platforms/android
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: yes | sdkmanager "ndk;27.2.12479018" "cmake;3.22.1" >/dev/null || true

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armsx2-android-arm64
          path: platforms/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  # ---- iOS .app ----------------------------------------------------------
  ios:
    name: iOS (arm64, unsigned)
    runs-on: macos-26
    # Non-blocking until the collapsed-core iOS build first goes green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Configure (CMake, Xcode generator, simulator SDK, no signing)
        working-directory: platforms/ios/app/src/main/cpp
        run: >
          cmake -G Xcode -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DARMSX2_REAL_DEVICE=OFF

      - name: Build
        working-directory: platforms/ios/app/src/main/cpp
        run: >
          cmake --build build --config Release
          -- -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: armsx2-ios-arm64
          path: platforms/ios/app/src/main/cpp/build/**/*.app
          if-no-files-found: warn
