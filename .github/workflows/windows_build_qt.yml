name: Windows Build Steps - Qt (arm64)

# Reusable workflow that builds the arm64 Windows Qt GUI *natively* on a
# GitHub-hosted Windows 11 arm64 runner (runs-on: windows-11-arm). Because the
# runner is arm64, there is no cross-compile: a single stage
# (build-dependencies-arm64.bat) builds the arm64 Qt + libraries with the native
# arm64 MSVC toolchain (vcvarsarm64.bat), and Qt builds its own arm64 host tools,
# so no x64 host deps or QT_HOST_PATH are required. PCSX2 is then configured
# natively against deps-arm64/. ffmpeg is loaded dynamically at runtime, so it is
# intentionally absent from deps-arm64.

on:
  workflow_call:
    inputs:
      jobName:
        required: true
        type: string
      artifactPrefixName:
        required: true
        type: string
      os:
        required: false
        type: string
        default: windows-11-arm
      configuration:
        required: false
        type: string
        default: Release
      patchesUrl:
        required: false
        type: string
        default: https://github.com/isztldav/pcsx2_patches/releases/download/latest
      fetchTags:
        required: false
        type: boolean
        default: false
      stableBuild:
        required: false
        type: boolean
        default: false

jobs:
  build_windows_qt_arm64:
    name: ${{ inputs.jobName }}
    runs-on: ${{ inputs.os }}
    # Set some sort of timeout in the event of run-away builds. Building the
    # arm64 Qt + deps from a cold cache is expensive.
    timeout-minutes: 120
    env:
      POWERSHELL_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      # actions/checkout elides tags, fetch them primarily for releases
      - name: Fetch Tags
        if: ${{ inputs.fetchTags }}
        run: git fetch --tags --no-recurse-submodules

      - name: Add stable release identifier file
        if: ${{ inputs.stableBuild == true || inputs.stableBuild == 'true' }}
        shell: bash
        run: |
          echo "#define DEFAULT_UPDATER_CHANNEL \"stable\"" > ./pcsx2-qt/DefaultUpdaterChannel.h
          cat ./pcsx2-qt/DefaultUpdaterChannel.h

      - name: Prepare Artifact Metadata
        id: artifact-metadata
        shell: bash
        env:
          PREFIX: ${{ inputs.artifactPrefixName }}
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./.github/workflows/scripts/common/name-artifacts.sh

      - name: Locate native arm64 vcvars
        shell: cmd
        run: |
            for /f "usebackq tokens=*" %%i in (`call vswhere -latest -property installationPath`) do set "VSINSTPATH=%%i"
            echo VCVARSPATH=%VSINSTPATH%\VC\Auxiliary\Build\vcvarsarm64.bat>>%GITHUB_ENV%

      - name: Download patches
        shell: cmd
        run: |
          cd bin/resources
          curl -L -o patches.zip "${{ inputs.patchesUrl }}/patches.zip"

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v6
        with:
          path: deps-arm64
          key: ${{ inputs.os }} arm64 deps ${{ hashFiles('.github/workflows/scripts/windows/build-dependencies-arm64.bat', '.github/workflows/scripts/windows/*.patch', '.github/workflows/scripts/common/*.patch') }}

      - name: Build arm64 Dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        env:
          DEBUG: 0
        run: .github/workflows/scripts/windows/build-dependencies-arm64.bat

      - name: Generate CMake
        id: cmake
        shell: cmd
        run: |
          call "%VCVARSPATH%" || exit /b
          cmake . -B build ^
            "-DCMAKE_PREFIX_PATH=%cd%\deps-arm64" ^
            -DQT_BUILD=ON ^
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration }} ^
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF ^
            -G Ninja || exit /b

      - name: Build PCSX2
        shell: cmd
        run: |
          call "%VCVARSPATH%" || exit /b
          cmake --build build --config ${{ inputs.configuration }} || exit /b
          cmake --install build --config ${{ inputs.configuration }} || exit /b
          REM We can use Segoe UI Emoji so we don't need to bundle this
          del bin\resources\fonts\Twemoji*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-metadata.outputs.artifact-name }}
          path: |
            ./bin
            !./bin/**/*.bsc
            !./bin/**/*.exp
            !./bin/**/*.ilk
            !./bin/**/*.iobj
            !./bin/**/*.ipdb
            !./bin/**/*.pdb
            !./bin/**/*.lib
