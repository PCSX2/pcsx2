# Nightly build pipeline for the single-core monorepo.
#
# Once a day (and on manual dispatch) this builds every shippable target and
# publishes them as a dated GitHub *pre-release* (nightly-YYYYMMDD) so anyone can
# download them. A prune step keeps only the newest 7 nightlies so the Releases
# page stays tidy (stable vX.Y.Z releases are never touched).
#
# Platform coverage mirrors build-all.yml's guardrail:
#   * PC arm64 Qt GUI  -> macOS / Linux (4K+16K) / Windows   (blocking for release)
#   * Android APK       -> sideloadable, debug-key-signed     (non-blocking, attach-if-present)
#   * iOS               -> NOT yet: the current CI job is only a simulator
#                          compile-check. Wire platforms/ios/scripts/build-ios-ipa.sh
#                          (unsigned device .ipa) here once the iphoneos build is green.
name: Nightly

on:
  push:
    branches: [master]       # build a nightly on every push to master
    paths-ignore:
      - '**/*.md'            # skip doc-only pushes
      - 'docs/**'
  schedule:
    - cron: '0 8 * * *'      # 08:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write            # create the release + tag, prune old ones

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  # ---- gate: skip empty nights; never run on forks -----------------------
  gate:
    name: Decide whether to build
    if: ${{ github.repository == 'ARMSX2/ARMSX2' }}
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      date: ${{ steps.check.outputs.date }}
      sha: ${{ steps.check.outputs.sha }}
      notes: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0     # needed for the 24h commit count below
      - id: check
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          # A manual dispatch always builds; a scheduled run only builds if there
          # was at least one commit in the last 24h (no point rebuilding nothing).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROCEED=true
          elif [ "$(git rev-list --count --since='24 hours ago' HEAD)" -gt 0 ]; then
            PROCEED=true
          else
            PROCEED=false
          fi
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"
          echo "proceed=$PROCEED date=$DATE sha=$SHA"

      # Plain-language changelog for the release body: one bullet per commit
      # since the previous nightly tag, with noise filtered and dev "[scope]"
      # tags stripped. No hashes/emojis/dashes. Built here because gate already
      # has full history (+ tags) checked out; the publish job (which has no
      # checkout) consumes it via needs.gate.outputs.notes.
      - id: notes
        run: |
          DATE="${{ steps.check.outputs.date }}"
          REPO="${{ github.repository }}"
          # most recent nightly-* tag that isn't today's (empty on the first nightly)
          PREV="$(git tag -l 'nightly-*' --sort=-creatordate | grep -vx "nightly-${DATE}" | head -1 || true)"
          if [ -n "$PREV" ] && git rev-parse -q --verify "refs/tags/${PREV}" >/dev/null; then
            RANGE="${PREV}..HEAD"
          elif git rev-parse -q --verify "HEAD~20" >/dev/null; then
            RANGE="HEAD~20..HEAD"        # first nightly: fall back to the last 20 commits
          else
            RANGE="HEAD"
          fi
          # Turn commit subjects into plain user-facing bullets:
          #  - drop internal commits (merge/revert/ci/chore/docs/build/style/test/
          #    refactor, translation syncs, version/cmake bumps)
          #  - strip conventional "feat/fix/perf:" prefixes and leading "[scope]" tags
          #  - convert em/en dashes (—/–) to commas so no AI-style dashes survive
          #  || true keeps head's SIGPIPE from tripping pipefail; empty output is fine.
          git log "$RANGE" --no-merges --pretty=format:'%s' \
            | grep -ivE '^(merge |revert )' \
            | grep -ivE '^(ci|chore|docs|build|style|test|refactor)(\(|:)' \
            | grep -ivE 'update translations|transifex|bump version|^version |^cmake ' \
            | sed -E 's/^(feat|fix|perf)(\([^)]*\))?!?: *//' \
            | sed 's/ *— */, /g; s/ *– */, /g' \
            | sed 's/^\[[^]]*\] *//' \
            | sed 's/^/- /' \
            | head -100 > changes.txt || true
          {
            echo "Automated nightly build for community testing (unsigned)."
            echo
            echo "Platforms: macOS arm64, Linux arm64 (4K and 16K pages), Windows arm64, Android (sideloadable APK). iOS is not included yet."
            echo
            echo "## What's new"
            if [ -s changes.txt ]; then cat changes.txt; else echo "- No notable changes since the last nightly."; fi
            if [ -n "$PREV" ]; then
              echo
              echo "Full changelog: https://github.com/${REPO}/compare/${PREV}...${{ github.sha }}"
            fi
          } > notes.md
          {
            echo 'body<<ARMSX2_NOTES_EOF'
            cat notes.md
            echo 'ARMSX2_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "----- generated release notes -----"; cat notes.md

  # ---- PC arm64 Qt GUI (blocking for the release) ------------------------
  pc-macos-arm64:
    name: PC · macOS arm64 (Qt)
    needs: gate
    if: ${{ needs.gate.outputs.proceed == 'true' }}
    uses: ./.github/workflows/macos_build.yml
    with:
      jobName: "macOS arm64"
      artifactPrefixName: "armsx2-macos-arm64"
      fetchTags: true

  pc-linux-arm64:
    name: PC · Linux arm64 (Qt)
    needs: gate
    if: ${{ needs.gate.outputs.proceed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - pageVariant: "4k"
            pageSize: "4096"
            cacheLineSize: "64"
          - pageVariant: "16k"
            pageSize: "16384"
            cacheLineSize: "128"
    uses: ./.github/workflows/linux_build_qt.yml
    with:
      jobName: "Linux arm64 (${{ matrix.pageVariant }} pages)"
      artifactPrefixName: "armsx2-linux-arm64-${{ matrix.pageVariant }}-appimage"
      compiler: clang
      cmakeflags: "-DHOST_PAGE_SIZE=${{ matrix.pageSize }} -DHOST_CACHE_LINE_SIZE=${{ matrix.cacheLineSize }}"
      buildAppImage: true
      fetchTags: true

  pc-windows-arm64:
    name: PC · Windows arm64 (Qt)
    needs: gate
    if: ${{ needs.gate.outputs.proceed == 'true' }}
    uses: ./.github/workflows/windows_build_qt.yml
    with:
      jobName: "Windows arm64"
      artifactPrefixName: "armsx2-windows-arm64"
      fetchTags: true

  # ---- Android APK (non-blocking; attached if it builds) -----------------
  android:
    name: Android APK
    needs: gate
    if: ${{ needs.gate.outputs.proceed == 'true' }}
    continue-on-error: true
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: platforms/android
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: yes | sdkmanager "ndk;28.2.13676358" "cmake;3.31.6" >/dev/null || true

      - name: Fetch shaderc third-party deps
        run: python3 app/src/main/cpp/3rdparty/shaderc/utils/git-sync-deps

      # Dual-core (4k + 16k page size) + PGO nightly. A stock `assembleRelease`
      # ships ONLY the 4k core and cannot load its native core on 16k-page
      # devices (Android 15+ handhelds). This compiles the core at both page
      # sizes and merges both .so's into one APK, with PGO=optimize so the
      # nightly matches release performance. See tools/ci-nightly-dualcore.sh.
      - name: Build dual-core (4k + 16k) + PGO APK
        env:
          FLAVOR: Github   # sideload build (com.armsx2)
          # Rotation signing so a nightly installs OVER an existing com.armsx2 build.
          # Add these repo secrets (base64 the keystores + lineage.bin):
          #   NIGHTLY_DEBUG_KS_B64      = base64 of the <=API32 debug keystore (f942d6bb)
          #   NIGHTLY_RELEASE_KS_B64    = base64 of armsx2_release.jks (df91c9ce)
          #   NIGHTLY_LINEAGE_B64       = base64 of the signing lineage .bin
          #   NIGHTLY_RELEASE_KS_PASS / NIGHTLY_RELEASE_KEY_ALIAS / NIGHTLY_RELEASE_KEY_PASS
          # Without them the script warns and uses a throwaway key (won't update-install).
          ROTATION_DEBUG_KS_B64: ${{ secrets.NIGHTLY_DEBUG_KS_B64 }}
          ROTATION_RELEASE_KS_B64: ${{ secrets.NIGHTLY_RELEASE_KS_B64 }}
          ROTATION_LINEAGE_B64: ${{ secrets.NIGHTLY_LINEAGE_B64 }}
          ROTATION_RELEASE_KS_PASS: ${{ secrets.NIGHTLY_RELEASE_KS_PASS }}
          ROTATION_RELEASE_KEY_ALIAS: ${{ secrets.NIGHTLY_RELEASE_KEY_ALIAS }}
          ROTATION_RELEASE_KEY_PASS: ${{ secrets.NIGHTLY_RELEASE_KEY_PASS }}
        run: |
          # versionCode = Unix seconds since 2023-11-14: monotonic, unique per build, and
          # always far above the manual 10xx codes, so a nightly always installs over the
          # previously installed build (and over the last hand-built release). Fits int32
          # for ~60 years. Manual builds, if any, should stay below or also use this.
          export VC="$(( $(date -u +%s) - 1700000000 ))"
          export VN="$(grep 'versionName' app/build.gradle.kts | sed -n 's/.*?:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)"
          export VN="${VN:-nightly}"
          if [ -n "$ROTATION_DEBUG_KS_B64" ] && [ -n "$ROTATION_RELEASE_KS_B64" ] && [ -n "$ROTATION_LINEAGE_B64" ]; then
            printf '%s' "$ROTATION_DEBUG_KS_B64"   | base64 -d > "$RUNNER_TEMP/debug.jks"
            printf '%s' "$ROTATION_RELEASE_KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            printf '%s' "$ROTATION_LINEAGE_B64"    | base64 -d > "$RUNNER_TEMP/lineage.bin"
            export ROTATION_DEBUG_KS="$RUNNER_TEMP/debug.jks"
            export ROTATION_RELEASE_KS="$RUNNER_TEMP/release.jks"
            export ROTATION_LINEAGE="$RUNNER_TEMP/lineage.bin"
          fi
          bash tools/ci-nightly-dualcore.sh

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: armsx2-android-arm64
          # ONLY the merged dual-core APK — not the intermediate single-core bases —
          # so the publish job attaches exactly one APK to the release.
          path: platforms/android/app/build/outputs/apk/nightly/*.apk
          if-no-files-found: warn

  # ---- publish: gather artifacts -> dated pre-release --------------------
  publish:
    name: Publish nightly release
    needs: [gate, pc-macos-arm64, pc-linux-arm64, pc-windows-arm64, android]
    # Run as long as the PC guardrail passed, even if Android failed (its APK is
    # then simply absent). `!cancelled()` disables the implicit "all needs must
    # succeed" gate so we can require only the PC jobs explicitly.
    # NOTE: must be a single-line ${{ }} with nothing around it -- a folded/multi-line
    # scalar leaves extra characters (a newline) around the expression, which GitHub
    # then treats as a truthy string and the guard is silently bypassed.
    if: ${{ !cancelled() && needs.gate.outputs.proceed == 'true' && needs.pc-macos-arm64.result == 'success' && needs.pc-linux-arm64.result == 'success' && needs.pc-windows-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    # Job-level so the Discord step's `if: env.HOOK != ''` guard can see it.
    env:
      HOOK: ${{ secrets.DISCORD_BUILD_WEBHOOK }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dl

      - name: Collect release assets
        run: |
          mkdir -p out
          # Single-file assets: macOS .tar.xz, Linux .AppImage, Android .apk
          find dl -type f \( -name '*.tar.xz' -o -name '*.AppImage' -o -name '*.apk' \) -exec cp {} out/ \;
          # Windows artifacts are a bin/ tree -> zip each one up
          for d in dl/*windows*/; do
            [ -d "$d" ] || continue
            base=$(basename "$d")
            (cd "$d" && zip -qr "$GITHUB_WORKSPACE/out/${base}.zip" .)
          done
          echo "Release assets:"; ls -la out

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ needs.gate.outputs.date }}
          name: "ARMSX2 nightly ${{ needs.gate.outputs.date }} (${{ needs.gate.outputs.sha }})"
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: false
          # Eden-style release notes (static intro + per-commit changelog + Full
          # Changelog link) assembled by the gate job, which has git history.
          body: ${{ needs.gate.outputs.notes }}
          files: out/*

      - name: Discord announce
        if: ${{ env.HOOK != '' }}
        env:
          REL_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/nightly-${{ needs.gate.outputs.date }}
          NOTES: ${{ needs.gate.outputs.notes }}
        run: |
          # Put the changelog in the embed. Discord caps embed descriptions at 4096
          # chars, so trim with headroom and point at the release page if it overflows.
          BODY=$(printf '%s' "$NOTES" | head -c 3800)
          if [ "${#NOTES}" -gt 3800 ]; then BODY=$(printf '%s\n\n(full changelog on the release page)' "$BODY"); fi
          jq -n --arg url "$REL_URL" --arg d "ARMSX2 nightly ${{ needs.gate.outputs.date }}" --arg body "$BODY" \
            '{username:"ARMSX2 CI", embeds:[{title:("🌙 " + $d + " published"), url:$url, color:5763719, description:$body}]}' \
          | curl -fsSL -H 'Content-Type: application/json' -d @- "$HOOK"

  # ---- prune: keep only the newest 7 nightlies ---------------------------
  prune:
    name: Prune old nightlies (keep 7)
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Delete all but the newest 7 nightly-* releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # startswith('nightly-') scopes this to nightlies -> stable vX.Y.Z is safe.
          gh release list --limit 100 --json tagName,createdAt \
            | jq -r '[.[] | select(.tagName | startswith("nightly-"))]
                     | sort_by(.createdAt) | reverse | .[7:] | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "Deleting old nightly: $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done
