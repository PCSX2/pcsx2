# Set update schedule for GitHub Actions
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    commit-message:
      # Prefix all commit messages with "Deps/gha: "
      prefix: "Deps/gha"
    groups:
      ci-deps:
        patterns:
          - "*"
