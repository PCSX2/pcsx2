# ARMSX2 GameDB overrides — layered on top of upstream GameIndex.yaml
# after it loads. Entries here either add NEW serials upstream doesn't
# cover, or PARTIAL-override existing upstream entries: scalar fields
# (compat, eeRoundMode, ...) replace upstream when present; list fields
# (gameFixes, speedHacks, gsHWFixes, memcardFilters, patches, dynaPatches)
# REPLACE upstream's list when specified — they don't append. Omit a
# field to inherit it from upstream.
#
# Use cases for this file:
#   - Mobile-GPU-specific GS hardware fixes (Mali / Adreno / PowerVR
#     quirks that don't apply on desktop and shouldn't go upstream)
#   - ARMSX2 speedhack defaults known to be safe per-title
#   - New serials missing from upstream's GameIndex.yaml
#
# Format mirrors upstream GameIndex.yaml exactly. Example:
#
# SLUS-12345:
#   name: "Example Game"
#   speedHacks:
#     mtvuHack: 1
#   gsHWFixes:
#     mipmap: 2
#     halfPixelOffset: 1
#
# Leave this file empty (just comments) when no overrides are needed.

# Valkyrie Profile 2: Silmeria (NTSC-U) — on Adreno/mobile, upstream's upscaling
# fixes (halfPixelOffset:4 + nativeScaling:2 Aggressive) cause a severe full-screen
# render-target blowout when upscaling. On-device, the ONLY combination that renders
# cleanly is Upscaling Fixes (nativeScaling) = Normal + Round Sprite = Half, with
# Half-Pixel Offset OFF. gsHWFixes REPLACES the upstream list wholesale, so listing
# ONLY these two drops upstream's halfPixelOffset:4 / textureInsideRT:1 / autoFlush:2
# (which is exactly the maintainer's confirmed-working manual config). gameFixes
# (VuAddSubHack) is omitted so it's inherited — that's what lets VP2 boot.
SLUS-21452:
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1   # Upscaling Fixes = Normal (upstream Aggressive 2 blows out on mobile)
    roundSprite: 1     # Round Sprite = Half
# Same mobile render-target blowout (Adreno/Mali) affects EVERY region of VP2, not just
# NTSC-U — the upscale glitch is GPU-driven, not region-specific. A user on Odin 2 (Adreno)
# reported "big orange spots all over the screen" at Chapter 1 on the PAL-I disc (SLES-54647)
# while NTSC-U was clean — because only NTSC-U had this override. Apply the identical fix to
# all PAL (E/F/G/I/S), Asian (SCAJ), Korean (SCKA) and Japanese (SLPM incl. Ultimate Hits)
# serials so they inherit the same clean config.
SLES-54644:            # PAL-E
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLES-54645:            # PAL-F
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLES-54646:            # PAL-G
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLES-54647:            # PAL-I (reported: Odin 2, orange spots at Chapter 1)
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLES-54648:            # PAL-S
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SCAJ-20177:            # NTSC-Asia
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SCAJ-20197:            # NTSC-Asia
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SCKA-20079:            # NTSC-K
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLPM-66419:            # NTSC-J
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1
SLPM-66782:            # NTSC-J (Ultimate Hits)
  name: "Valkyrie Profile 2 - Silmeria"
  gsHWFixes:
    nativeScaling: 1
    roundSprite: 1

# LEGO Batman: The Videogame (all releases) — upstream sets halfPixelOffset:4 +
# nativeScaling:1, which is right, but mobile (Vulkan AND OpenGL) still shows
# upscaling artifacts until Round Sprite = Full. Add roundSprite:2; the other two are
# re-listed because gsHWFixes REPLACES the upstream list.
SCUS-10380:
  name: "LEGO Batman - The Videogame"
  gsHWFixes:
    halfPixelOffset: 4 # (upstream) aligns post-processing
    nativeScaling: 1   # (upstream) post-processing smoothness/position
    roundSprite: 2     # Full — fixes upscaling artifacts on mobile
SLUS-21785:
  name: "LEGO Batman - The Videogame"
  gsHWFixes:
    halfPixelOffset: 4
    nativeScaling: 1
    roundSprite: 2     # Full — fixes upscaling artifacts on mobile
SLES-55135:
  name: "LEGO Batman - The Videogame"
  gsHWFixes:
    halfPixelOffset: 4
    nativeScaling: 1
    roundSprite: 2     # Full — fixes upscaling artifacts on mobile
SLPS-25908:
  name: "LEGO Batman - The Videogame"
  gsHWFixes:
